services:
  # Web Service - Spring Boot API (electrolink)
  - type: web
    name: electrolink-backend-api
    runtime: java
    region: oregon
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT $JAVA_OPTS -jar target/electrolink-platform-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: "8091"
      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m"
      # Mapeo de variables exactas para tu application.properties desde la base de datos de Render
      - key: DB_HOST
        fromDatabase:
          name: electrolink-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: electrolink-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: electrolink-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: electrolink-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: electrolink-db
          property: password

      # Variables requeridas por tu proyecto
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""

    healthCheckPath: /actuator/health

databases:
  # Base de Datos PostgreSQL administrada para el proyecto
  - name: electrolink-db
    databaseName: electrolink_spring_pruebas
    plan: free
    region: oregon